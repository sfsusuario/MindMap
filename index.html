<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Mind Map</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 50% 40%, #1a1f35 0%, #080b14 100%);
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #mindmap { width: 100vw; height: 100vh; display: block; }

    .link { fill: none; stroke-linecap: round; }

    /* Bubbles */
    .bubble {
      stroke: rgba(255,255,255,0.22);
      stroke-width: 1.5px;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Staggered breathing per depth so shapes don't all pulse together */
    .bubble.d0 {
      animation: breathe 4.2s ease-in-out infinite;
      stroke: rgba(255,255,255,0.5); stroke-width: 2.5px;
      filter: drop-shadow(0 0 18px rgba(180,210,255,0.55)) drop-shadow(0 0 40px rgba(80,140,220,0.25));
    }
    .bubble.d1 {
      animation: breathe 5.8s ease-in-out infinite; animation-delay: -0.8s;
      stroke: rgba(255,255,255,0.3); stroke-width: 2px;
    }
    .bubble.d2 { animation: breathe 7.1s ease-in-out infinite; animation-delay: -2.1s; }
    .bubble.d3 { animation: breathe 8.6s ease-in-out infinite; animation-delay: -3.4s; stroke-width: 1px; }
    .bubble.d4 { animation: breathe 10s  ease-in-out infinite; animation-delay: -5s;  stroke-width: 1px; }

    @keyframes breathe {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.06); }
    }

    .node { cursor: pointer; }
    .node.leaf { cursor: default; }

    .node:hover .bubble {
      stroke: rgba(255,255,255,0.75);
      stroke-width: 2.5px;
    }

    .node text {
      pointer-events: none;
      user-select: none;
      fill: rgba(255,255,255,0.93);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .expand-dot { fill: rgba(255,255,255,0.8); }

    /* Legend – clickable section shortcuts */
    #legend {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 7px;
      transition: background 0.14s, color 0.14s;
    }
    .legend-item:hover {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.95);
    }
    .legend-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    /* Hint */
    #hint {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      letter-spacing: 0.04em;
      text-align: right;
      line-height: 1.8;
    }

    /* Hover tooltip – full label text */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(12, 16, 32, 0.95);
      color: rgba(255,255,255,0.92);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.13);
      max-width: 280px;
      line-height: 1.55;
      box-shadow: 0 4px 20px rgba(0,0,0,0.65);
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      word-break: break-word;
    }
    #tooltip.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>
  <svg id="mindmap"></svg>
  <div id="legend"></div>
  <div id="hint">
    Click &nbsp;·&nbsp; expandir / colapsar<br>
    Doble click en nodo &nbsp;·&nbsp; expandir todo<br>
    Drag &nbsp;·&nbsp; reposicionar &nbsp;&nbsp; Scroll &nbsp;·&nbsp; zoom<br>
    Doble click en fondo &nbsp;·&nbsp; centrar vista<br>
    Leyenda &nbsp;·&nbsp; ir a sección
  </div>
  <div id="tooltip"></div>

  <script>
  (() => {
    // ── Config ────────────────────────────────────────────────────────────────
    const COLORS     = ['#4F86C6', '#E07B54', '#5BAD72', '#A06BC0', '#26B5A0'];
    const SEC_NAMES  = ['Arquitectura', 'Bases de Datos', 'Vue.js', '.NET / C#', 'IA en Dev'];

    // Visual sizes per depth (0=root, 1=H2, 2=H3, 3=bullet, 4=sub-bullet)
    // hex   pill   circle  diamond  square
    const RADII  = [72, 58, 38, 26, 14];   // effective physics radius
    const FS     = [14, 13, 10,  8,  7];   // font-size px
    const PILL_W = 130, PILL_H = 42;        // pill dimensions (depth 1)

    // ── State ────────────────────────────────────────────────────────────────
    const allNodes = new Map();   // id → node object (permanent registry)
    const allLinks = new Map();   // key → link object (permanent registry)
    let simNodes = [], simLinks = [];
    let simulation;
    let rootId;

    // ── SVG / Zoom setup ─────────────────────────────────────────────────────
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#mindmap').attr('width', W).attr('height', H);

    // container must exist before zoom handler is invoked
    const container = svg.append('g').attr('class', 'canvas');
    const gL = container.append('g');  // links drawn below nodes
    const gN = container.append('g');  // nodes

    const zoom = d3.zoom()
      .scaleExtent([0.07, 10])
      .on('zoom', e => container.attr('transform', e.transform));

    svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2));

    // Double-click SVG background → reset view
    svg.on('dblclick.zoom', () =>
      svg.transition().duration(650)
         .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2))
    );

    let lSel = gL.selectAll('line');
    let nSel = gN.selectAll('g.node');

    // ── Drag (reposition individual nodes) ───────────────────────────────────
    const drag = d3.drag()
      .on('start', (e, d) => {
        e.sourceEvent.stopPropagation();  // don't pan while dragging a node
        if (!e.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
        d._moved = false;
      })
      .on('drag', (e, d) => {
        d.fx = e.x; d.fy = e.y;
        d._moved = true;
      })
      .on('end', (e, d) => {
        if (!e.active) simulation.alphaTarget(0);
        // Unpin after drag (let simulation take over again), except root
        if (d.id !== rootId) { d.fx = null; d.fy = null; }
      });

    // ── Shared node/link factory (used by all parsers) ───────────────────────
    let nodeCounter = 0;

    function node(label, depth, parentId, sec) {
      const id = 'n' + nodeCounter++;
      const n = {
        id, label, depth, parentId,
        sectionIndex: sec,
        children: [],
        isExpanded: false,
        r: RADII[Math.min(depth, 4)],
        _moved: false,
      };
      allNodes.set(id, n);
      if (parentId != null) {
        allNodes.get(parentId).children.push(id);
        const k = parentId + '~' + id;
        allLinks.set(k, { id: k, source: parentId, target: id, depth });
      }
      return id;
    }

    // ── CS.md parser ─────────────────────────────────────────────────────────
    function parse(md) {
      rootId = node('CS Apuntes', 0, null, -1);
      let h2Id = null, h3Id = null, lastB0Id = null, sec = -1;

      for (const raw of md.split('\n')) {
        const t = raw.trim();
        if (!t || t === '---') { lastB0Id = null; continue; }

        const hm = t.match(/^(#{1,3}) (.*)/);
        if (hm) {
          const lv = hm[1].length;
          const lbl = clean(hm[2]);
          if (lv === 2) {
            sec++;
            h2Id = node(shortH2(lbl), 1, rootId, sec);
            h3Id = null; lastB0Id = null;
          } else if (lv === 3) {
            h3Id = node(lbl, 2, h2Id ?? rootId, sec);
            lastB0Id = null;
          }
          continue;
        }

        // Bullet: `^( *)\* (.*)` — indent=0 is direct child of H3; indent>0 is sub-bullet
        const bm = raw.match(/^( *)\* (.*)/);
        if (!bm) continue;
        const indent = bm[1].length;
        const lbl    = clean(bm[2]);

        if (indent === 0) {
          lastB0Id = node(lbl, 3, h3Id ?? h2Id ?? rootId, sec);
        } else {
          node(lbl, 4, lastB0Id ?? h3Id ?? h2Id ?? rootId, sec);
        }
      }
    }

    // ── IA.md parser ─────────────────────────────────────────────────────────
    // Handles: numbered lists (0 and 4-space indent), dash bullets (- and  -),
    // ## headings, and implicit section headers (lines ending with ":")
    function parseIA(md) {
      const sec    = 4;
      const iaRoot = node('IA en Dev', 1, rootId, sec);
      let section  = iaRoot;  // current depth-2 bucket
      let b0       = null;    // current depth-3 node
      let b1       = null;    // current depth-4 node (for deeper nesting)

      for (const raw of md.split('\n')) {
        const t = raw.trim();
        if (!t) continue;

        // ## Heading → depth-2 section
        const hm = t.match(/^## (.*)/);
        if (hm) {
          section = node(clean(hm[1]), 2, iaRoot, sec);
          b0 = b1 = null; continue;
        }

        // Non-indented line ending with ":" → implicit depth-2 section
        if (!raw.match(/^\s/) && t.endsWith(':') && !t.match(/^\d/)) {
          section = node(clean(t.replace(/:$/, '')), 2, iaRoot, sec);
          b0 = b1 = null; continue;
        }

        // Numbered items at any indent level
        const nm = raw.match(/^( *)\d+\. (.*)/);
        if (nm) {
          const lbl = clean(nm[2]);
          if (nm[1].length <= 3) {
            b0 = node(lbl, 3, section, sec); b1 = null;
          } else {
            b1 = node(lbl, 4, b0 ?? section, sec);
          }
          continue;
        }

        // Dash bullets: - (0), sub (4+), deep (8+)
        const dm = raw.match(/^( *)- (.*)/);
        if (!dm) continue;
        const lbl = clean(dm[2]);
        const ind = dm[1].length;
        if (ind === 0) {
          b0 = node(lbl, 3, section, sec); b1 = null;
        } else if (ind <= 5) {
          b1 = node(lbl, 4, b0 ?? section, sec);
        } else {
          node(lbl, 4, b1 ?? b0 ?? section, sec);
        }
      }
    }

    function clean(s) {
      return s
        .replace(/\$\\rightarrow\$/g, '→')
        .replace(/\$[^$]+\$/g, '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/^\d+\.\s+/, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function shortH2(s) {
      if (/arquitectura/i.test(s))          return 'Arquitectura';
      if (/datos|sql/i.test(s))             return 'Bases de Datos';
      if (/vue/i.test(s))                   return 'Vue.js';
      if (/net|c#|fundamentos/i.test(s))    return '.NET / C#';
      return trunc(s, 14);
    }

    function trunc(s, max) {
      return s.length <= max ? s : s.slice(0, max - 1) + '…';
    }

    // SVG shape helpers
    function hexPoints(r) {
      return Array.from({ length: 6 }, (_, i) => {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        return `${(r * Math.cos(a)).toFixed(2)},${(r * Math.sin(a)).toFixed(2)}`;
      }).join(' ');
    }

    function diamondPoints(r) {
      return `0,${-r} ${r},0 0,${r} ${-r},0`;
    }

    function wrapLabel(text, maxCh, maxLines) {
      const words = text.split(' ');
      const lines = [];
      let cur = '';
      for (const w of words) {
        const next = cur ? cur + ' ' + w : w;
        if (cur && next.length > maxCh) {
          lines.push(cur);
          if (lines.length >= maxLines) return lines;
          cur = w;
        } else {
          cur = next;
        }
      }
      if (cur && lines.length < maxLines) lines.push(cur);
      return lines.length ? lines : [text.slice(0, maxCh)];
    }

    // ── D3 Force Simulation ───────────────────────────────────────────────────
    function buildSim() {
      const REPULSION = [-520, -310, -180, -100, -60];

      simulation = d3.forceSimulation(simNodes)
        .force('link', d3.forceLink(simLinks)
          .id(d => d.id)
          .distance(lk => {
            const s = res(lk.source), t = res(lk.target);
            return (s ? s.r : 50) + (t ? t.r : 35) + 30;
          })
          .strength(0.52))
        .force('charge', d3.forceManyBody()
          .strength(d => REPULSION[Math.min(d.depth, 4)]))
        .force('collide', d3.forceCollide()
          .radius(d => {
            if (d.depth === 1) return Math.hypot(PILL_W / 2, PILL_H / 2) + 8;
            return d.r + (d.depth >= 3 ? 32 : 14);
          })
          .strength(0.88))
        .force('center', d3.forceCenter(0, 0))
        .alphaDecay(0.018)
        .on('tick', tick);
    }

    function restartSim() {
      simulation.nodes(simNodes);
      simulation.force('link').links(simLinks);
      simulation.alpha(0.45).restart();
    }

    // resolve: forceLink converts string IDs to node objects after first tick
    function res(x) {
      return typeof x === 'string' ? allNodes.get(x) : x;
    }

    // ── Tick: update positions ────────────────────────────────────────────────
    function tick() {
      lSel
        .attr('x1', d => res(d.source)?.x ?? 0)
        .attr('y1', d => res(d.source)?.y ?? 0)
        .attr('x2', d => res(d.target)?.x ?? 0)
        .attr('y2', d => res(d.target)?.y ?? 0);
      nSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
    }

    // ── Color helpers ─────────────────────────────────────────────────────────
    function nodeColor(d) {
      if (d.depth === 0) return '#1b2a3d';
      const base = COLORS[d.sectionIndex] ?? '#888';
      return d3.color(base).darker(d.depth * 0.3).toString();
    }

    function linkColor(d) {
      const t = res(d.target);
      return COLORS[t?.sectionIndex ?? 0] ?? '#555';
    }

    // ── Render (D3 data join) ─────────────────────────────────────────────────
    function render() {
      // ---- Links ----
      lSel = gL.selectAll('line').data(simLinks, d => d.id)
        .join(
          e => e.append('line')
                 .attr('class', 'link')
                 .attr('stroke', linkColor)
                 .attr('stroke-width', d => [2.8, 1.8, 1.2, 0.7][Math.min(d.depth - 1, 3)])
                 .attr('stroke-opacity', 0)
                 .call(l => l.transition().duration(450).attr('stroke-opacity', 0.4)),
          u => u,
          x => x.transition().duration(300).attr('stroke-opacity', 0).remove()
        );

      // ---- Nodes ----
      nSel = gN.selectAll('g.node').data(simNodes, d => d.id)
        .join(
          // ENTER: new nodes pop out from their parent's position
          e => {
            const g = e.append('g')
              .attr('class', d => `node${d.children.length === 0 ? ' leaf' : ''}`)
              .attr('transform', d => {
                const p = d.parentId ? allNodes.get(d.parentId) : d;
                return `translate(${p.x ?? 0},${p.y ?? 0})`;
              })
              .call(drag)
              .on('click', handleClick)
              .on('dblclick', handleDblClick);

            // Per-depth shapes: hex (0) · pill (1) · circle (2) · diamond (3) · square (4)
            g.each(function(d) {
              const el    = d3.select(this);
              const cls   = `bubble d${Math.min(d.depth, 4)}`;
              const color = nodeColor(d);

              if (d.depth === 0) {
                // ⬡ Hexagon root
                el.append('polygon').attr('class', cls).attr('fill', color)
                  .attr('points', hexPoints(0))
                  .transition().duration(650).ease(d3.easeBackOut.overshoot(1.3))
                  .attrTween('points', () => t => hexPoints(d.r * t));
              } else if (d.depth === 1) {
                // ▬ Pill for sections (wide label area)
                el.append('rect').attr('class', cls).attr('fill', color)
                  .attr('rx', PILL_H / 2)
                  .attr('x', 0).attr('y', 0).attr('width', 0).attr('height', 0)
                  .transition().duration(520).ease(d3.easeBackOut.overshoot(1.4))
                  .attr('x', -PILL_W / 2).attr('y', -PILL_H / 2)
                  .attr('width', PILL_W).attr('height', PILL_H);
              } else if (d.depth === 2) {
                // ● Circle for sub-sections
                el.append('circle').attr('class', cls).attr('r', 0).attr('fill', color)
                  .transition().duration(500).ease(d3.easeBackOut.overshoot(1.5))
                  .attr('r', d.r);
              } else if (d.depth === 3) {
                // ◆ Diamond for bullet items
                el.append('polygon').attr('class', cls).attr('fill', color)
                  .attr('points', diamondPoints(0))
                  .transition().duration(450).ease(d3.easeBackOut.overshoot(1.5))
                  .attrTween('points', () => t => diamondPoints(d.r * t));
              } else {
                // ▪ Rounded square for sub-bullets
                const s = d.r * 2;
                el.append('rect').attr('class', cls).attr('fill', color)
                  .attr('rx', 4)
                  .attr('x', 0).attr('y', 0).attr('width', 0).attr('height', 0)
                  .transition().duration(400).ease(d3.easeBackOut.overshoot(1.5))
                  .attr('x', -s / 2).attr('y', -s / 2).attr('width', s).attr('height', s);
              }
            });

            // Expand indicator – top-right corner adapted per shape
            g.filter(d => d.children.length > 0)
              .append('circle')
              .attr('class', 'expand-dot')
              .attr('r', 3.5)
              .attr('cx', d => d.depth === 1 ? PILL_W / 2 - 9  : d.r - 5)
              .attr('cy', d => d.depth === 1 ? -PILL_H / 2 + 9 : -(d.r - 5))
              .style('opacity', 0)
              .transition().delay(350).duration(200).style('opacity', 0.85);

            // Hover tooltip – always shows the complete label
            const tip = document.getElementById('tooltip');
            g.on('mouseenter.tip', (ev, d) => {
                tip.textContent = d.label;
                tip.classList.add('show');
              })
              .on('mousemove.tip', ev => {
                const x = ev.clientX + 14, y = ev.clientY - 10;
                const ow = tip.offsetWidth  || 200;
                const oh = tip.offsetHeight || 40;
                tip.style.left = Math.min(x, window.innerWidth  - ow - 8) + 'px';
                tip.style.top  = Math.min(y, window.innerHeight - oh - 8) + 'px';
              })
              .on('mouseleave.tip', () => tip.classList.remove('show'));

            // Labels – word-wrap instead of hard truncation
            g.each(function(d) {
              const el    = d3.select(this);
              const depth = Math.min(d.depth, 4);
              const fs    = FS[depth];

              if (d.depth === 1) {
                // Pill: single bold centered line
                el.append('text')
                  .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
                  .attr('y', 0).attr('font-size', fs + 'px').attr('font-weight', '600')
                  .attr('letter-spacing', '0.03em')
                  .style('opacity', 0).text(d.label)
                  .transition().delay(260).duration(300).style('opacity', 1);
              } else if (d.depth >= 3) {
                // Diamond / square: wrapped lines below the shape
                const lines = wrapLabel(d.label, d.depth === 3 ? 20 : 22, 3);
                const lh    = fs + 2;
                lines.forEach((line, i) => {
                  el.append('text')
                    .attr('text-anchor', 'middle').attr('dominant-baseline', 'hanging')
                    .attr('y', d.r + 5 + i * lh).attr('font-size', fs + 'px')
                    .style('opacity', 0).text(line)
                    .transition().delay(260).duration(300).style('opacity', 1);
                });
              } else {
                // Hex / circle: wrapped lines centered inside
                const maxCh = [20, 16, 13][d.depth] ?? 13;
                const lines  = wrapLabel(d.label, maxCh, 3);
                const lh     = fs * 1.3;
                const startY = -(lines.length - 1) * lh / 2;
                lines.forEach((line, i) => {
                  el.append('text')
                    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
                    .attr('y', startY + i * lh).attr('font-size', fs + 'px')
                    .style('opacity', 0).text(line)
                    .transition().delay(260).duration(300).style('opacity', 1);
                });
              }
            });

            return g;
          },

          // UPDATE: positions are handled by tick(), nothing extra needed
          u => u,

          // EXIT: fade all shapes (works for circle, polygon, rect uniformly)
          x => {
            x.selectAll('.bubble').transition().duration(300).attr('opacity', 0);
            x.selectAll('text').transition().duration(220).style('opacity', 0);
            x.transition().delay(330).remove();
          }
        );
    }

    // ── Expand / Collapse ─────────────────────────────────────────────────────
    function handleClick(event, d) {
      event.stopPropagation();
      if (d._moved) { d._moved = false; return; }
      if (d.children.length === 0) return;
      d.isExpanded ? collapse(d) : expand(d);
    }

    function handleDblClick(event, d) {
      event.stopPropagation();
      if (d.children.length === 0) return;
      expandAll(d);
    }

    // Expand all descendants in one pass (single restartSim + render)
    function expandAll(root) {
      function addDeep(n) {
        if (n.children.length === 0) return;
        n.isExpanded = true;
        n.children.forEach(cid => {
          const c = allNodes.get(cid);
          c.x = (n.x ?? 0) + (Math.random() - 0.5) * 8;
          c.y = (n.y ?? 0) + (Math.random() - 0.5) * 8;
          c.vx = c.vy = 0;
          if (!simNodes.includes(c)) simNodes.push(c);
          const lk = allLinks.get(n.id + '~' + cid);
          if (lk && !simLinks.includes(lk)) simLinks.push(lk);
          addDeep(c);
        });
      }
      addDeep(root);
      restartSim();
      render();
    }

    // Pan + zoom to a node, expanding it if needed
    function goToSection(secIdx) {
      const root = allNodes.get(rootId);
      if (secIdx >= root.children.length) return;
      const h2 = allNodes.get(root.children[secIdx]);
      if (!h2.isExpanded && h2.children.length > 0) expand(h2);
      const scale = 1.3;
      svg.transition().duration(750)
         .call(zoom.transform, d3.zoomIdentity
           .translate(W / 2 - (h2.x ?? 0) * scale, H / 2 - (h2.y ?? 0) * scale)
           .scale(scale));
    }

    function expand(node) {
      node.isExpanded = true;
      node.children.forEach(cid => {
        const c = allNodes.get(cid);
        // Seed position near parent so bubbles pop out from it
        c.x = (node.x ?? 0) + (Math.random() - 0.5) * 6;
        c.y = (node.y ?? 0) + (Math.random() - 0.5) * 6;
        c.vx = c.vy = 0;
        if (!simNodes.includes(c)) simNodes.push(c);
        const lk = allLinks.get(node.id + '~' + cid);
        if (lk && !simLinks.includes(lk)) simLinks.push(lk);
      });
      restartSim();
      render();
    }

    function collapse(node) {
      node.isExpanded = false;
      removeDesc(node);
      restartSim();
      render();
    }

    function removeDesc(node) {
      node.children.forEach(cid => {
        const c = allNodes.get(cid);
        if (c.isExpanded) removeDesc(c);
        c.isExpanded = false;
        const ni = simNodes.indexOf(c);
        if (ni !== -1) simNodes.splice(ni, 1);
        const lk = allLinks.get(node.id + '~' + cid);
        if (lk) { const li = simLinks.indexOf(lk); if (li !== -1) simLinks.splice(li, 1); }
      });
    }

    // ── Legend – clickable section shortcuts ─────────────────────────────────
    function buildLegend() {
      const leg = d3.select('#legend');
      SEC_NAMES.forEach((name, i) => {
        const item = leg.append('div')
          .attr('class', 'legend-item')
          .attr('title', `Ir a: ${name}`)
          .on('click', () => goToSection(i));
        item.append('div').attr('class', 'legend-dot').style('background', COLORS[i]);
        item.append('span').text(name);
      });
    }

    // ── Gentle drift: keep the canvas feeling alive ───────────────────────────
    function startDrift() {
      setInterval(() => {
        if (simulation.alpha() < 0.004) simulation.alpha(0.012).restart();
      }, 4500);
    }

    // ── Main ─────────────────────────────────────────────────────────────────
    async function main() {
      const v = Date.now();
      const [csMd, iaMd] = await Promise.all([
        fetch('./CS.md?v=' + v).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ' – CS.md'); return r.text(); }),
        fetch('./IA.md?v=' + v).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ' – IA.md'); return r.text(); }),
      ]);

      // Parse both files into the shared node/link registry
      parse(csMd);
      parseIA(iaMd);

      // Bootstrap sim with only root + H2 nodes visible
      const root = allNodes.get(rootId);
      simNodes = [root];
      root.children.forEach(cid => {
        simNodes.push(allNodes.get(cid));
        simLinks.push(allLinks.get(rootId + '~' + cid));
      });

      // Pin root at center; pre-position H2 in a ring to avoid random explosion
      root.fx = 0; root.fy = 0; root.x = 0; root.y = 0;
      const h2s    = root.children.map(id => allNodes.get(id));
      const orbit  = 190;
      h2s.forEach((n, i) => {
        const angle = (2 * Math.PI * i / h2s.length) - Math.PI / 2;
        n.x = Math.cos(angle) * orbit;
        n.y = Math.sin(angle) * orbit;
      });

      buildSim();
      render();
      buildLegend();

      // Start drift after initial layout settles
      setTimeout(startDrift, 7000);
    }

    main().catch(err => {
      svg.append('text')
        .attr('x', W / 2).attr('y', H / 2 - 10)
        .attr('text-anchor', 'middle')
        .attr('fill', '#E07B54')
        .attr('font-size', '15px')
        .attr('font-family', 'monospace')
        .text('⚠ ' + err.message);
      svg.append('text')
        .attr('x', W / 2).attr('y', H / 2 + 18)
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(255,255,255,0.4)')
        .attr('font-size', '12px')
        .text('Usa  npx serve .  para desarrollo local');
    });
  })();
  </script>
</body>
